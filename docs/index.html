<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>BackupSDK Documentation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet"
        href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">

  <style>
    :root {
      --theme-color: #2f4858;
      --sidebar-width: 290px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #2f4053;
      background: #ffffff;
    }

    .sidebar {
      background: #f8fafc;
      border-right: 1px solid #e2e8f0;
      padding: 28px 20px;
    }

    .sidebar-nav {
      margin-top: 30px;
    }

    .app-name-link {
      font-size: 25px;
      font-weight: 750;
      color: #2f4858 !important;
      letter-spacing: -0.4px;
    }

    .sidebar-nav strong {
      display: block;
      margin-top: 22px;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 800;
      color: #2f4858;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .sidebar ul li {
      margin: 5px 0;
    }

    .sidebar ul li a {
      font-size: 15px;
      color: #526579;
      padding: 8px 12px;
      border-radius: 9px;
      display: block;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .sidebar ul li a:hover {
      background: #eaf1f7;
      color: #2f4858;
      transform: translateX(2px);
    }

    .sidebar ul li.active > a {
      background: #dfeaf3;
      color: #2f4858;
      font-weight: 700;
    }

    .content {
      padding-top: 38px;
    }

    .markdown-section {
      max-width: 900px;
    }

    .markdown-section h1 {
      font-size: 42px;
      color: #2f4858;
      margin-bottom: 22px;
      padding-bottom: 12px;
      border-bottom: 2px solid #edf2f7;
      letter-spacing: -0.8px;
    }

    .markdown-section h2 {
      color: #2f4858;
      margin-top: 46px;
      letter-spacing: -0.3px;
    }

    .markdown-section p,
    .markdown-section li {
      font-size: 16px;
      line-height: 1.7;
    }

    .markdown-section pre {
      border-radius: 10px;
      box-shadow: 0 2px 10px rgba(15, 23, 42, 0.08);
    }

    code {
      border-radius: 6px;
    }
  </style>
</head>

<body>

<div id="app"></div>

<script>
  window.$docsify = {
    name: 'BackupSDK',
    repo: '',
    loadSidebar: true,
    subMaxLevel: 0
  }
</script>

<script src="//cdn.jsdelivr.net/npm/docsify@4"></script>

</body>

</html>
