<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>BackupSDK Documentation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet"
        href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">

  <style>
    :root {
      --theme-color: #2563eb;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    /* Sidebar */
    .sidebar {
      border-right: 1px solid #ececec;
      padding-top: 18px;
    }

    .sidebar-nav {
      margin-top: 28px;
    }

    .sidebar ul li a {
      font-size: 15px;
      padding: 7px 0;
    }

    /* App title */
    .app-name-link {
      font-size: 24px;
      font-weight: 700;
    }

    /* Content */
    .markdown-section {
      max-width: 920px;
    }

    .markdown-section h1 {
      font-size: 42px;
      margin-bottom: 16px;
    }

    .markdown-section h2 {
      margin-top: 48px;
    }

    code {
      border-radius: 6px;
    }
  </style>
</head>

<body>

<div id="app"></div>

<script>
  window.$docsify = {
    name: 'BackupSDK',
    repo: '',
    loadSidebar: true,
    subMaxLevel: 2
  }
</script>

<script src="//cdn.jsdelivr.net/npm/docsify@4"></script>

</body>

</html>
